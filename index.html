<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美腸スタイル診断 | Premium Counseling</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #4a7c59;
            --bg: #f8f9fa;
        }

        body {
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 10px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #app {
            background: #fff;
            width: 100%; max-width: 500px;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }

        /* カテゴリーごとの色設定 */
        .theme-sleep { --accent: #5b67a5; }   /* 紺色 */
        .theme-move { --accent: #e67e22; }    /* オレンジ */
        .theme-food { --accent: #27ae60; }    /* 緑 */
        .theme-mental { --accent: #9b59b6; }  /* 紫 */
        .theme-luxury { --accent: #e74c3c; }  /* 赤 */

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cat-tag { 
            padding: 4px 12px; background: var(--accent); color: white; 
            border-radius: 20px; font-size: 0.8rem; transition: 0.5s;
        }
        
        .progress-num { font-size: 0.8rem; color: #aaa; }

        .question-area { min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        h2 { font-size: 1.25rem; line-height: 1.6; margin-bottom: 30px; transition: 0.3s; }

        .options { display: grid; gap: 12px; }
        button.opt {
            border: 2px solid #f0f0f0; background: #fff; border-radius: 16px;
            padding: 16px; font-size: 1rem; cursor: pointer; transition: 0.2s;
            text-align: center; color: #444; font-weight: 500;
        }
        button.opt:hover { border-color: var(--accent); background: #fdfdfd; transform: translateY(-2px); }
        button.opt:active { transform: scale(0.98); }

        /* 結果画面 */
        #result-screen { display: none; text-align: center; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .chart-box { margin: 20px 0; background: #fff; border-radius: 20px; padding: 10px; }
        .advice-card { text-align: left; background: #fefefe; border-radius: 15px; padding: 15px; margin-top: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        
        .cta-btn {
            display: block; margin-top: 30px; padding: 18px;
            background: var(--accent); color: white; text-decoration: none;
            border-radius: 50px; font-weight: bold;
        }
    </style>
</head>
<body class="theme-sleep">

<div id="app">
    <div id="quiz-screen">
        <div class="header">
            <span id="cat-tag" class="cat-tag">良質な睡眠</span>
            <span id="progress-text" class="progress-num">1 / 30</span>
        </div>
        <div class="question-area">
            <h2 id="q-text">読み込み中...</h2>
            <div id="options" class="options"></div>
        </div>
    </div>

    <div id="result-screen">
        <h2 style="color: var(--accent);">診断完了！</h2>
        <div class="chart-box"><canvas id="radarChart"></canvas></div>
        <div id="advice-list" class="advice-card"></div>
        <a href="YOUR_LINE_URL" class="cta-btn">詳しくプロに相談する</a>
    </div>
</div>

<script>
const data = [
    { cat: "良質な睡眠", theme: "theme-sleep", items: [
        { q: "1. 昼間に眠気が出ることがありますか？", type: "-" },
        { q: "2. なかなか寝付けないことがありますか？", type: "-" },
        { q: "3. 寝る時間が決まっていませんか？", type: "-" },
        { q: "4. 夜中に何度も目が覚めますか？", type: "-" },
        { q: "5. 照明をつけたまま寝ていますか？", type: "-" },
        { q: "6. 就寝前3時間以内に食事をすることがありますか？", type: "-" }
    ], answers: ["全くない(快眠)", "たまにある", "よくある", "ほぼ毎日(辛い)"] },

    { cat: "適度な運動", theme: "theme-move", items: [
        { q: "1. 正しい姿勢で過ごせていますか？", type: "+" },
        { q: "2. 安静時に深い呼吸ができていますか？", type: "+" },
        { q: "3. 毎日のストレッチをしていますか？", type: "+" },
        { q: "4. 30分以上連続で座り続けないよう意識していますか？", type: "+" },
        { q: "5. 毎日30分以上の歩行をしていますか？", type: "+" },
        { q: "6. 筋力トレーニングを習慣にしていますか？", type: "+" }
    ], answers: ["完璧！", "意識している", "あまりできていない", "全くしていない"] },

    { cat: "食事習慣", theme: "theme-food", items: [
        { q: "1. 野菜が50%を占める献立回数は？", type: "+" },
        { q: "2. 炭水化物20%:タンパク質30%の比率は？", type: "+" },
        { q: "3. 油脂摂取(大さじ2杯)を意識していますか？", type: "+" },
        { q: "4. 発酵食品の摂取量は？", type: "+" },
        { q: "5. 食物繊維の摂取量は？", type: "+" },
        { q: "6. 咀嚼回数(1口30回)は？", type: "+" }
    ], answers: ["バッチリ", "だいたいOK", "少し足りない", "意識していない"] },

    { cat: "メンタル", theme: "theme-mental", items: [
        { q: "1. ストレスを溜め込みやすいですか？", type: "-" },
        { q: "2. ストレスを引きずってしまう？", type: "-" },
        { q: "3. 気分転換がうまくいかない？", type: "-" },
        { q: "4. 解消してもスッキリしない？", type: "-" },
        { q: "5. 気持ちが落ち込むことがよくある？", type: "-" },
        { q: "6. 最近の自分は幸せだと思わない？", type: "-" }
    ], answers: ["そんなことない", "たまにある", "けっこうある", "常に感じる"] },

    { cat: "嗜好品", theme: "theme-luxury", items: [
        { q: "1. 喫煙(副流煙含む)の機会は？", type: "-" },
        { q: "2. 添加物の摂取量は？", type: "-" },
        { q: "3. 砂糖の摂取量は？", type: "-" },
        { q: "4. アルコールの摂取頻度は？", type: "-" },
        { q: "5. 揚げ物の摂取頻度は？", type: "-" },
        { q: "6. 冷たい飲み物の摂取は？", type: "-" }
    ], answers: ["ほぼゼロ", "控えめ", "普通に摂る", "かなり多い"] }
];

let flatQuestions = [];
data.forEach(group => {
    group.items.forEach(item => {
        flatQuestions.push({ ...item, cat: group.cat, theme: group.theme, ansLabels: group.answers });
    });
});

let currentIdx = 0;
let scores = { "良質な睡眠": 0, "適度な運動": 0, "食事習慣": 0, "メンタル": 0, "嗜好品": 0 };

function render() {
    const q = flatQuestions[currentIdx];
    document.body.className = q.theme;
    document.getElementById('cat-tag').innerText = q.cat;
    document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${flatQuestions.length}`;
    document.getElementById('q-text').innerText = q.q;

    const optContainer = document.getElementById('options');
    optContainer.innerHTML = '';

    q.ansLabels.forEach((label, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.innerText = label;
        btn.onclick = () => {
            // スコア計算：1〜4点。マイナスタイプは反転
            let val = 4 - i; 
            if(q.type === "-") val = i + 1; // 悪い項目で「ほぼ毎日(i=3)」なら1点になるように調整
            // ↑ ロジック修正：健康な状態を高い点数にする
            let scoreToAdd = (q.type === "+") ? (4 - i) : (i + 1);
            // 修正：ポジティブな回答（左側 i=0）ほど高得点（4点）になるように統一
            let finalScore = 4 - i; 
            
            scores[q.cat] += finalScore;
            currentIdx++;
            if(currentIdx < flatQuestions.length) render();
            else showResult();
        };
        optContainer.appendChild(btn);
    });
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    const ctx = document.getElementById('radarChart').getContext('2d');
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: Object.keys(scores),
            datasets: [{
                label: 'あなたの腸活バランス',
                data: Object.values(scores),
                backgroundColor: 'rgba(74, 124, 89, 0.2)',
                borderColor: 'rgba(74, 124, 89, 1)',
                pointBackgroundColor: 'rgba(74, 124, 89, 1)'
            }]
        },
        options: {
            scales: { r: { min: 6, max: 24, ticks: { stepSize: 6 } } },
            plugins: { legend: { display: false } }
        }
    });

    const advice = document.getElementById('advice-list');
    advice.innerHTML = "<strong>💡 カテゴリー別評価</strong><br>";
    Object.entries(scores).forEach(([cat, s]) => {
        let star = s > 18 ? "⭐⭐⭐" : s > 12 ? "⭐⭐" : "⭐";
        advice.innerHTML += `<div style="margin-top:8px; font-size:0.9rem;">${cat}: ${star} (${s}/24点)</div>`;
    });
}

render();
</script>
</body>
</html>
