<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腸活総合カウンセリング診断</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4a7c59; /* 深みのあるグリーン */
            --bg: #fdfaf5;
            --card-bg: #ffffff;
            --text: #333;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #app {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.5rem; color: var(--primary); }

        /* プログレスバー */
        .progress-wrapper { height: 6px; background: #eee; border-radius: 10px; margin-bottom: 40px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }

        /* 質問エリア */
        .question-section h3 { font-size: 0.9rem; color: #888; margin-bottom: 5px; }
        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 25px; min-height: 3.6rem; }
        
        .options { display: grid; gap: 15px; }
        button.option-btn {
            padding: 20px; border: 2px solid #f0f0f0; border-radius: 15px;
            background: white; cursor: pointer; font-size: 1rem; transition: 0.2s;
            text-align: left;
        }
        button.option-btn:hover { border-color: var(--primary); background: #f4f8f5; }

        /* 結果エリア */
        #result-screen { display: none; text-align: center; }
        .chart-box { width: 100%; margin: 20px 0; }
        
        .advice-list { text-align: left; margin-top: 30px; }
        .category-result {
            padding: 15px; border-radius: 10px; margin-bottom: 10px;
            border-left: 5px solid var(--primary); background: #f9f9f9;
        }
        .cat-name { font-weight: bold; font-size: 0.9rem; display: block; }
        
        .cta-container { margin-top: 40px; }
        .btn-line {
            background: #06c755; color: white; padding: 15px 40px;
            border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-screen">
        <div class="header"><h1>腸活診断カウンセリング</h1></div>
        <div class="progress-wrapper"><div id="progress-bar"></div></div>
        <div class="question-section">
            <h3 id="category-label">カテゴリー</h3>
            <div id="question-text" class="question-text">読み込み中...</div>
            <div id="options-container" class="options"></div>
        </div>
    </div>

    <div id="result-screen">
        <h2>診断結果プロファイル</h2>
        <div class="chart-box"><canvas id="radarChart"></canvas></div>
        <div id="advice-area" class="advice-list"></div>
        <div class="cta-container">
            <a href="YOUR_LINE_URL" class="btn-line">公式LINEでアドバイスを受ける</a>
        </div>
    </div>
</div>

<script>
/**
 * type: "plus"（多いほど良い）, "minus"（多いほど悪い）
 */
const questions = [
    // 睡眠
    { cat: "良質な睡眠", q: "昼間に眠気が出ることがありますか？", type: "minus" },
    { cat: "良質な睡眠", q: "なかなか寝付けないことがありますか？", type: "minus" },
    { cat: "良質な睡眠", q: "寝る時間が決まっていませんか？", type: "minus" },
    { cat: "良質な睡眠", q: "夜中に何度も目が覚めますか？", type: "minus" },
    { cat: "良質な睡眠", q: "照明をつけたまま寝ていますか？", type: "minus" },
    { cat: "良質な睡眠", q: "就寝前3時間以内に食事をすることがありますか？", type: "minus" },
    // 運動
    { cat: "適度な運動", q: "正しい姿勢で過ごせていますか？", type: "plus" },
    { cat: "適度な運動", q: "安静時に深い呼吸ができていますか？", type: "plus" },
    { cat: "適度な運動", q: "毎日のストレッチをしていますか？", type: "plus" },
    { cat: "適度な運動", q: "30分以上連続で座り続けないよう意識していますか？", type: "plus" },
    { cat: "適度な運動", q: "毎日30分以上の歩行をしていますか？", type: "plus" },
    { cat: "適度な運動", q: "筋力トレーニングを習慣にしていますか？", type: "plus" },
    // 食事
    { cat: "食事習慣", q: "野菜が50%を占める献立は多いですか？", type: "plus" },
    { cat: "食事習慣", q: "炭水化物20%：タンパク質30%の比率を意識していますか？", type: "plus" },
    { cat: "食事習慣", q: "適量の油脂摂取（大さじ2杯程度）を意識していますか？", type: "plus" },
    { cat: "食事習慣", q: "発酵食品を十分に摂取していますか？", type: "plus" },
    { cat: "食事習慣", q: "食物繊維の量を意識していますか？", type: "plus" },
    { cat: "食事習慣", q: "一口につき30回以上咀嚼していますか？", type: "plus" },
    // メンタル
    { cat: "メンタル", q: "ストレスを溜め込みやすいですか？", type: "minus" },
    { cat: "メンタル", q: "ストレスを引きずってしまうことがありますか？", type: "minus" },
    { cat: "メンタル", q: "気分転換がうまくできないと感じますか？", type: "minus" },
    { cat: "メンタル", q: "リフレッシュしてもストレスが解消されませんか？", type: "minus" },
    { cat: "メンタル", q: "気持ちが落ち込むことがよくありますか？", type: "minus" },
    { cat: "メンタル", q: "最近の自分は幸せではないと感じますか？", type: "minus" },
    // 嗜好品
    { cat: "嗜好品", q: "喫煙（副流煙を含む）の機会はありますか？", type: "minus" },
    { cat: "嗜好品", q: "添加物を含む食品をよく摂取しますか？", type: "minus" },
    { cat: "嗜好品", q: "砂糖の多いお菓子や飲料を好みますか？", type: "minus" },
    { cat: "嗜好品", q: "アルコールを頻繁に摂取しますか？", type: "minus" },
    { cat: "嗜好品", q: "揚げ物をよく食べますか？", type: "minus" },
    { cat: "嗜好品", q: "冷たい飲み物をよく飲みますか？", type: "minus" }
];

let currentStep = 0;
const scores = { "良質な睡眠": 0, "適度な運動": 0, "食事習慣": 0, "メンタル": 0, "嗜好品": 0 };

function loadQuestion() {
    const q = questions[currentStep];
    document.getElementById('category-label').innerText = q.cat;
    document.getElementById('question-text').innerText = q.q;
    const container = document.getElementById('options-container');
    container.innerHTML = '';

    const opts = [
        { t: "非常によくある / はい", v: 3 },
        { t: "たまにある / どちらかといえば", v: 2 },
        { t: "あまりない / いいえ", v: 1 }
    ];

    opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt.t;
        btn.onclick = () => handleAnswer(opt.v);
        container.appendChild(btn);
    });

    document.getElementById('progress-bar').style.width = (currentStep / questions.length * 100) + '%';
}

function handleAnswer(val) {
    const q = questions[currentStep];
    // スコア計算ロジック（minusタイプは値を反転させる）
    let points = (q.type === "plus") ? val : (4 - val);
    scores[q.cat] += points;

    currentStep++;
    if (currentStep < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    const ctx = document.getElementById('radarChart').getContext('2d');
    // 最大値は各項目6問×3点 = 18点
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: Object.keys(scores),
            datasets: [{
                label: '腸活バランス',
                data: Object.values(scores),
                backgroundColor: 'rgba(74, 124, 89, 0.2)',
                borderColor: 'rgba(74, 124, 89, 1)',
                pointBackgroundColor: 'rgba(74, 124, 89, 1)'
            }]
        },
        options: {
            scales: { r: { min: 0, max: 18, ticks: { stepSize: 3 } } }
        }
    });

    const adviceArea = document.getElementById('advice-area');
    Object.entries(scores).forEach(([cat, score]) => {
        let msg = score > 14 ? "素晴らしい状態です。" : score > 8 ? "改善の余地があります。" : "優先的に見直しが必要です。";
        adviceArea.innerHTML += `
            <div class="category-result">
                <span class="cat-name">${cat} (スコア: ${score}/18)</span>
                <span>${msg}</span>
            </div>
        `;
    });
}

loadQuestion();
</script>
</body>
</html>
